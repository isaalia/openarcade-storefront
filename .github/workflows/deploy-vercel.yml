name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check VERCEL_TOKEN
        id: check-token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN secret is not set — deploy skipped."
            echo ""
            echo "To fix, choose ONE of:"
            echo "  Option A: Set VERCEL_TOKEN secret"
            echo "    1. Create a token: https://vercel.com/account/tokens"
            echo "    2. Add as GitHub secret VERCEL_TOKEN (+ VERCEL_ORG_ID, VERCEL_PROJECT_ID)"
            echo "    3. Re-run this workflow"
            echo ""
            echo "  Option B: Use deploy hooks (no token)"
            echo "    See .github/workflows/deploy-hook.yml"
            echo ""
            echo "  Option C: Install Vercel GitHub App (auto-deploys, no token needed)"
            echo "    https://github.com/apps/vercel"
            exit 1
          fi
          echo "has_token=true" >> $GITHUB_OUTPUT

      - name: Install Vercel CLI
        if: steps.check-token.outputs.has_token == 'true'
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        if: steps.check-token.outputs.has_token == 'true' && github.ref == 'refs/heads/main'
        run: vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (preview)
        if: steps.check-token.outputs.has_token == 'true' && github.ref != 'refs/heads/main'
        run: vercel deploy --token="${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
