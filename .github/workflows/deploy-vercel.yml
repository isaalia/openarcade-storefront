name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: "Deploy to Vercel"
    needs: build
    runs-on: ubuntu-latest
    # Only run deploy if VERCEL_TOKEN is set
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_TOKEN != null }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main'
        run: vercel deploy --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel deploy --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-skip-notice:
    name: "⏭️ Vercel deploy skipped (no VERCEL_TOKEN)"
    needs: build
    if: ${{ secrets.VERCEL_TOKEN == '' || secrets.VERCEL_TOKEN == null }}
    runs-on: ubuntu-latest
    steps:
      - name: Print skip notice
        run: |
          echo "============================================"
          echo "⚠️  VERCEL_DEPLOY_SKIPPED"
          echo "============================================"
          echo ""
          echo "The deploy was skipped because VERCEL_TOKEN is not configured as a GitHub secret."
          echo ""
          echo "To enable Vercel CI/CD, choose ONE of:"
          echo ""
          echo "  Option A: Set VERCEL_TOKEN secret"
          echo "    1. Create a token at https://vercel.com/account/tokens"
          echo "    2. Set as GitHub secret: VERCEL_TOKEN"
          echo "    3. Re-run this workflow"
          echo ""
          echo "  Option B: Use Vercel Deploy Hooks (no token needed)"
          echo "    1. Open Vercel dashboard → Settings → Git → Deploy Hooks"
          echo "    2. Create a Deploy Hook"
          echo "    3. Add the URL as GitHub secret: DEPLOY_HOOK_URL"
          echo "    4. Use .github/workflows/deploy-hook.yml instead"
          echo ""
          echo "  Option C: Install Vercel GitHub App"
          echo "    1. Visit https://github.com/apps/vercel"
          echo "    2. Install on isaalia/openarcade-storefront"
          echo "    3. Auto-deploys on every push — no token needed"
          echo "============================================"
