name: Deploy via Vercel Hook

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check DEPLOY_HOOK_URL
        id: check-hook
        run: |
          if [ -z "${{ secrets.DEPLOY_HOOK_URL }}" ]; then
            echo "❌ DEPLOY_HOOK_URL secret is not set — deploy skipped."
            echo ""
            echo "To fix:"
            echo "  1. Open Vercel dashboard → Settings → Git → Deploy Hooks"
            echo "  2. Create a new Deploy Hook"
            echo "  3. Set as GitHub secret: DEPLOY_HOOK_URL"
            exit 1
          fi
          echo "has_hook=true" >> $GITHUB_OUTPUT

      - name: Trigger Vercel deploy via hook
        if: steps.check-hook.outputs.has_hook == 'true'
        run: |
          echo "Triggering Vercel deploy hook..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "⚠️ Deploy hook returned HTTP $RESPONSE"
            echo "Check the Vercel dashboard for deployment status."
          fi
