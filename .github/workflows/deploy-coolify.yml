name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check COOLIFY_DEPLOY_URL
        id: check-url
        run: |
          if [ -z "${{ secrets.COOLIFY_DEPLOY_URL }}" ]; then
            echo "⚠️ COOLIFY_DEPLOY_URL not configured — skipping Coolify deploy."
            echo "   To enable Coolify CI/CD:"
            echo "    1. Obtain the Coolify deploy webhook URL from the Coolify dashboard"
            echo "    2. Set as GitHub secret: COOLIFY_DEPLOY_URL"
            echo "    3. Re-run this workflow"
            exit 0
          fi
          echo "has_url=true" >> $GITHUB_OUTPUT

      - name: Trigger Coolify deployment
        if: steps.check-url.outputs.has_url == 'true'
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_DEPLOY_URL }}" \
            -H "Accept: application/json"
