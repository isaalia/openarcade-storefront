# OpenArcade Storefront — Docker Compose for Coolify/Hetzner
# This is a minimal config. Coolify will override most settings via its UI.

version: "3.8"

services:
  storefront:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
